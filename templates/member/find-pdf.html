{% extends "base_templates/base-form-page.html" %}

{% block title %}Polstjärnan{% endblock %}

{% block page_header %}Polstjärnan{% endblock %}

{% block page_content %}
    <form method="post">
        <div class="mb-3">
            <label class="form-label">År</label>
            <input class="form-control" min="1980" max="2026" type="number"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Månad</label>
            <input class="form-control" min="1" max="12" type="number"/>
        </div>

        <input class="btn btn-primary" type="submit" />
    </form>
{% endblock %}
