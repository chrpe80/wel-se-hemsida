{% extends "base_templates/base-form-page.html" %}

{% block title %}Radera center{% endblock %}

{% block page_header %}Radera center{% endblock %}

{% block page_content %}

    <div class="container-fluid">
        <div class="row">
            <div class="col">

                <form method="post" action="{{ url_for('admin.delete_center') }}">
                    <div class="mb-3">
                        <label for="center" class="form-label">Center</label>
                        <select id="center" class="form-select" name="center">
                            <option disabled selected>Välj center</option>
                            {% if centers %}
                                {% for center in centers %}
                                    <option value="{{ center['_id'] }}">{{ center["title"] }}</option>
                                {% endfor %}
                            {% endif %}
                        </select>
                    </div>

                    <div>
                        <button class="btn btn-primary" type="submit">Spara</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
{% endblock %}
