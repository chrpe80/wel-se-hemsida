{% extends "base_templates/base-form-page.html" %}

{% block title %}Lägg till bild{% endblock %}

{% block page_header %}Lägg till bild{% endblock %}

{% block page_content %}

    <div class="container-fluid">
        <div class="row">
            <div class="col">

                <form method="post" action="{{ url_for('admin.add_image') }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label" for="identifier">ID</label>
                        <select id="identifier" class="form-select" name="identifier">
                            {% if identifiers_img %}
                                <option disabled selected>Välj alternativ</option>
                                {% for k, v in identifiers_img.items() %}
                                    <option value="{{ k }}">{{ v }}</option>
                                {% endfor %}
                            {% endif %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="image">Bild ( jpeg, 16:9 )</label>
                        <input id="image" class="form-control mb-3" type="file" name="image"/>
                    </div>

                    <div>
                        <input class="btn btn-primary" type="submit" value="Ladda upp"/>
                    </div>
                </form>

            </div>
        </div>
    </div>
{% endblock %}
