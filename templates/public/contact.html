{% extends "base_templates/base.html" %}

{% block title %}Title{% endblock %}

{% block content %}

    <section class="max-width bg-secondary-subtle p-3 rounded">
        <div class="container-fluid">
            <div class="row">
                <div class="col">
                    <h1>Kontakta oss</h1>
                </div>
            </div>
        </div>

        <div class="container-fluid">
            <div class="row">
                <div class="col">
                    <form method="post" action="{{ url_for('public.contact') }}" id="article-form">

                        <div class="form-group mb-3">
                            <label for="name">Namn</label>
                            <input type="text" class="form-control" id="name" name="name">
                        </div>

                        <div class="form-group mb-3">
                            <label for="email">Email</label>
                            <input type="text" class="form-control" id="email" name="email">
                        </div>

                        <div class="form-group mb-3">
                            <label for="msg">Meddelande</label>
                            <textarea class="form-control" id="msg" name="msg" rows="3"></textarea>
                        </div>


                        <div>
                            <input class="btn btn-primary" type="submit" value="Spara">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

{% endblock %}
