{% extends "base_templates/base-info-page.html" %}

{% block title %}Medlemsskap{% endblock %}

{% block page_header %}Medlemsskap{% endblock %}

{% block page_content %}
    {% if article %}
        <p>{{ article | safe }}</p>
    {% endif %}

    {% if img %}
        <img class="img-fluid rounded" src="{{ img }}" alt="Bild för {{ title }}">
    {% endif %}
{% endblock %}
