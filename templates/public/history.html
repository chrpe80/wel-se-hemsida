{% extends "base_templates/base-info-page.html" %}

{% block title %}Historia{% endblock %}

{% block page_header %}Historia{% endblock %}

{% block page_content %}
    {% if article %}
        <p>{{ article["content"] | safe }}</p>

        <img class="img-fluid rounded" src="data:image/jpeg;base64,{{ article['thumbnail'] }}"
             alt="Bild för {{ article['identifier'] }}">
    {% endif %}
{% endblock %}
