{% extends "base_templates/base.html" %}

{% block title %} Böcker {% endblock %}

{% block content %}
    {% include "includes/navbar.html" %}

    {% if books %}

        <section class="py-4">

            <div class="container-fluid">

                <div class="row gy-4 row-cols-1 row-cols-md-2 row-cols-lg-3">

                    {% for book in books %}
                        <div class="col">
                            <div class="card bg-primary-subtle height-publication-card">
                                <div class="card-body d-flex flex-column">
                                    <span class="badge bg-primary mb-3 align-self-start">{{ book["price"] }} kr</span>
                                    <h4 class="card-title">{{ book["title"] }}</h4>
                                    <h6 class="text-muted mb-3 card-subtitle">{{ book["author"] }}</h6>

                                    <a class="card-link mt-auto"
                                       href="{{ url_for('public.product_book', product_id=book['_id']) }}">
                                        Produktsida
                                    </a>
                                </div>
                            </div>
                        </div>
                    {% endfor %}

                </div>

            </div>
        </section>

    {% endif %}

{% endblock %}
