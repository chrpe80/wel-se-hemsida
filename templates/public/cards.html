{% extends "base_templates/base.html" %}

{% block title %} Kort {% endblock %}

{% block content %}

    {% if cards %}

        <section class="py-4">

            <div class="container-fluid">

                <div class="row gy-4 row-cols-1 row-cols-md-2 row-cols-lg-3">

                    {% for card in cards %}
                        <div class="col">
                            <div class="card bg-primary-subtle height-publication-card">
                                <div class="card-body d-flex flex-column">
                                    <span class="badge bg-primary mb-3 align-self-start">{{ card["price"] }} kr</span>
                                    <h4 class="card-title">{{ card["title"] }}</h4>
                                    <h6 class="text-muted mb-3 card-subtitle">{{ card["artist"] }}</h6>

                                    <a class="card-link mt-auto"
                                       href="{{ url_for('public.product_card', product_id=card['_id']) }}">
                                        Produktsida
                                    </a>
                                </div>
                            </div>
                        </div>
                    {% endfor %}

                </div>

            </div>

        </section>

    {% endif %}

{% endblock %}
